<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TARPHub</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E👀%3C/text%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fffff5;
      min-height: 100vh;
    }

    .page {
      max-width: 440px;
      margin: 0 auto;
      padding: 48px 20px 60px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      display: inline-flex;
      align-items: center;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: #000;
      color: #fff;
      padding: 6px 8px 6px 14px;
      border-radius: 8px;
    }

    .logo h1 .hub {
      background: #ffc800;
      color: #000;
      padding: 2px 10px;
      border-radius: 6px;
      margin-left: 6px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    a.link {
      display: block;
      padding: 15px 18px;
      background: #fff;
      border: 1.5px solid #e0e0d8;
      border-radius: 10px;
      text-decoration: none;
      color: #000;
      font-size: 0.95rem;
      font-weight: 500;
      text-align: center;
      transition: border-color 0.15s, transform 0.1s;
    }

    a.link:hover {
      border-color: #000;
      transform: translateY(-1px);
    }

    a.link:active {
      transform: scale(0.99);
    }

    a.link small {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: #999;
      margin-top: 3px;
    }

    a.link.primary {
      background: #ffc800;
      border-color: #ffc800;
      color: #000;
      font-weight: 600;
    }

    a.link.primary:hover {
      background: #e6b400;
      border-color: #e6b400;
    }

    a.link.primary small {
      color: rgba(0,0,0,0.5);
    }

  </style>
</head>
<body>
  <div class="page">
    <div class="logo">
      <h1>TARP<span class="hub">Hub</span></h1>
    </div>

    <div class="links">
      <a class="link primary" href="https://dice.fm/partner/tickets/event/8e6pa7-toni-and-ryan-podcast-tonis-hens-night-19th-may-troxy-london-tickets" target="_blank">
        Toni's Hens Night - London
        <small>19th May -- Troxy, Limehouse</small>
      </a>

      <a class="link" href="img1.jpg" target="_blank">Random Website 1</a>

      <a class="link" href="img2.jpg" target="_blank">Random Website 2</a>

      <a class="link" href="hr.html">HR Complaints</a>
    </div>
  </div>
</body>
</html>
