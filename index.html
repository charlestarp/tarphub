<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TARPHub</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E👀%3C/text%3E%3C/svg%3E">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #000000;
      color: #fffff5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Yellow accent stripe at top */
    .top-stripe {
      width: 100%;
      height: 4px;
      background: #ffc800;
    }

    .header {
      text-align: center;
      padding: 50px 20px 32px;
    }

    .header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ffc800;
      text-transform: uppercase;
    }

    .header p {
      color: rgba(255, 255, 245, 0.5);
      font-size: 0.9rem;
      margin-top: 6px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .links {
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: block;
      padding: 16px 20px;
      background: transparent;
      border: 2px solid rgba(255, 255, 245, 0.12);
      border-radius: 10px;
      color: #fffff5;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    .link-btn:hover {
      border-color: #ffc800;
      color: #ffc800;
      transform: translateY(-1px);
    }

    .link-btn.featured {
      background: #ffc800;
      border-color: #ffc800;
      color: #000000;
    }

    .link-btn.featured:hover {
      background: #e6b400;
      border-color: #e6b400;
      color: #000;
      transform: translateY(-1px);
    }

    .link-btn.blue {
      border-color: #2946af;
      color: #8093ff;
    }

    .link-btn.blue:hover {
      background: #2946af;
      border-color: #2946af;
      color: #fffff5;
    }

    .link-btn .subtitle {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      opacity: 0.6;
      margin-top: 3px;
    }

    .link-btn.featured .subtitle {
      opacity: 0.7;
      color: #000;
    }

    .footer {
      margin-top: auto;
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    .footer-brand {
      color: rgba(255, 255, 245, 0.15);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .hr-link {
      display: inline-block;
      margin-top: 10px;
      color: rgba(255, 255, 245, 0.08);
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }

    .hr-link:hover {
      color: rgba(255, 255, 245, 0.25);
    }
  </style>
</head>
<body>
  <div class="top-stripe"></div>

  <div class="header">
    <h1>TARPHub</h1>
    <p>Toni and Ryan</p>
  </div>

  <div class="links">
    <a class="link-btn featured" href="https://dice.fm/partner/tickets/event/8e6pa7-toni-and-ryan-podcast-tonis-hens-night-19th-may-troxy-london-tickets" target="_blank">
      Toni's Hens Night - London
      <span class="subtitle">19th May -- Troxy, Limehouse</span>
    </a>

    <a class="link-btn blue" href="img1.jpg" target="_blank">
      Random Website 1
    </a>

    <a class="link-btn" href="img2.jpg" target="_blank">
      Random Website 2
    </a>
  </div>

  <div class="footer">
    <div class="footer-brand">tarphub</div>
    <a href="hr.html" class="hr-link">HR Complaints</a>
  </div>
</body>
</html>
