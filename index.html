<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TARPHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #7c63ff, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #86868b;
      font-size: 1rem;
      margin-top: 8px;
    }

    .links {
      width: 100%;
      max-width: 600px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-btn {
      display: block;
      padding: 18px 24px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s ease;
    }

    .link-btn:hover {
      background: #222;
      border-color: #7c63ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(124, 99, 255, 0.15);
    }

    .link-btn .subtitle {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      color: #86868b;
      margin-top: 4px;
    }

    .footer {
      margin-top: auto;
      padding: 40px 20px;
      color: #3a3a3a;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TARPHub</h1>
    <p>Toni and Ryan</p>
  </div>

  <div class="links">
    <a class="link-btn" href="https://dice.fm/partner/tickets/event/8e6pa7-toni-and-ryan-podcast-tonis-hens-night-19th-may-troxy-london-tickets" target="_blank">
      Toni's Hens Night - London
      <span class="subtitle">19th May - Troxy, Limehouse</span>
    </a>

    <a class="link-btn" href="https://xhamster.com/" target="_blank">
      Random Website 1
    </a>

    <a class="link-btn" href="https://www.xvideos.com/" target="_blank">
      Random Website 2
    </a>
  </div>

  <div class="footer">tarphub</div>
</body>
</html>
