<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Department - TARPHub</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E👀%3C/text%3E%3C/svg%3E">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #000000;
      color: #fffff5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .top-stripe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: #ffc800;
    }
    .code {
      font-size: 7rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #ffc800;
      line-height: 1;
    }
    .message {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 12px;
      color: #fffff5;
    }
    .sub {
      font-size: 0.85rem;
      color: rgba(255, 255, 245, 0.35);
      margin-top: 10px;
    }
    a {
      color: rgba(255, 255, 245, 0.2);
      text-decoration: none;
      margin-top: 40px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    a:hover { color: #ffc800; }
  </style>
</head>
<body>
  <div class="top-stripe"></div>
  <div class="code">404</div>
  <div class="message">HR Not Found</div>
  <div class="sub">There is no HR department. Good luck.</div>
  <a href="index.html">Back to TARPHub</a>
</body>
</html>
